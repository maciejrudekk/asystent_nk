name: Budowa Asystent NK Android

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: Instalacja Pythona
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacja Fluttera
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalacja Flet
        run: pip install flet

      - name: Budowanie APK
        run: flet build apk --project "Asystent_NK" --product "Org_NK"

      - name: Udostępnienie pliku APK
        uses: actions/upload-artifact@v4
        with:
          name: Asystent-NK-APK
          path: build/apk/app-release.apk