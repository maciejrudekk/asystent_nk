name: Build APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64
      ANDROID_SDK_ROOT: /home/runner/android-sdk
      ANDROID_HOME: /home/runner/android-sdk
      ANDROID_SDK_HOME: /home/runner/.android
      ANDROID_NDK_ROOT: /home/runner/android-sdk/ndk/21.3.6528147
      ANDROID_NDK_HOME: /home/runner/android-sdk/ndk/21.3.6528147
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jdk-headless unzip zip tar libncurses6 libstdc++6 libffi-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Android SDK command line tools
        run: |
          mkdir -p "$ANDROID_SDK_ROOT"
          cd "$ANDROID_SDK_ROOT"
          curl -o commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools.zip
          mkdir -p cmdline-tools/latest
          for entry in cmdline-tools/*; do
            if [ "$entry" = "cmdline-tools/latest" ]; then
              continue
            fi
            mv "$entry" cmdline-tools/latest/ || true
          done
          rm -rf tools
          ln -s cmdline-tools/latest tools
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_SDK_ROOT/platform-tools" >> "$GITHUB_PATH"
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --install \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.0" \
            "build-tools;37.0.0" \
            "ndk;21.3.6528147" \
            "cmdline-tools;latest" \
            "extras;google;m2repository" \
            "extras;android;m2repository"

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          export PATH="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$ANDROID_SDK_ROOT/platform-tools:$PATH"
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --install \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.0" \
            "build-tools;37.0.0" \
            "ndk;21.3.6528147" \
            "cmdline-tools;latest" \
            "extras;google;m2repository" \
            "extras;android;m2repository"
          yes | sdkmanager --sdk_root="$ANDROID_SDK_ROOT" --licenses

      - name: Link buildozer SDK path
        run: |
          mkdir -p /home/runner/.buildozer/android/platform
          rm -rf /home/runner/.buildozer/android/platform/android-sdk
          ln -s "$ANDROID_SDK_ROOT" /home/runner/.buildozer/android/platform/android-sdk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython kivy

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-build
          path: bin/*.apk
          retention-days: 30

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: bin/*.apk
          asset_name: Asystent-NK-v${{ github.ref }}.apk
          asset_content_type: application/vnd.android.package-archive
